name: Cybersecurity Jobs Bot (Elite Pro - Safe Mode v2)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: jobs-bot
      cancel-in-progress: true

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🔁 Restore state safely
      - name: Restore seen_jobs.json from data branch
        run: |
          git fetch origin data:data || true
          git checkout data -- seen_jobs.json 2>/dev/null || echo '[]' > seen_jobs.json

          # Validate JSON
          if ! python3 -c "import json; json.load(open('seen_jobs.json'))" 2>/dev/null; then
            echo "⚠️ Corrupt file → resetting"
            echo '[]' > seen_jobs.json
          fi

          echo "✅ Restored ($(wc -c < seen_jobs.json) bytes)"

      # 🚀 Run bot with better logging
      - name: Run bot (Safe Mode)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID:  ${{ secrets.TELEGRAM_GROUP_ID }}

          TOPIC_EGYPT:       ${{ secrets.TOPIC_EGYPT }}
          TOPIC_REMOTE:      ${{ secrets.TOPIC_REMOTE }}
          TOPIC_PENTEST:     ${{ secrets.TOPIC_PENTEST }}
          TOPIC_SOC:         ${{ secrets.TOPIC_SOC }}
          TOPIC_APPSEC:      ${{ secrets.TOPIC_APPSEC }}
          TOPIC_CLOUDSEC:    ${{ secrets.TOPIC_CLOUDSEC }}
          TOPIC_GRC:         ${{ secrets.TOPIC_GRC }}
          TOPIC_SECENG:      ${{ secrets.TOPIC_SECENG }}
          TOPIC_GULF:        ${{ secrets.TOPIC_GULF }}
          TOPIC_INTERNSHIPS: ${{ secrets.TOPIC_INTERNSHIPS }}

          # APIs
          RAPIDAPI_KEY:      ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          FINDWORK_API_KEY:  ${{ secrets.FINDWORK_API_KEY }}
          JOOBLE_API_KEY:    ${{ secrets.JOOBLE_API_KEY }}
          REED_API_KEY:      ${{ secrets.REED_API_KEY }}

          # SAFE MODE
          SAFE_MODE: "true"
          MAX_REQUESTS_PER_SOURCE: "5"

        run: |
          echo "🚀 Starting bot..."
          sleep $((RANDOM % 10 + 5))

          python main.py 2>&1 | tee bot.log || echo "❌ Bot failed"

      # 💾 Save state with conflict protection
      - name: Save seen_jobs.json to data branch
        if: always()
        run: |
          cp seen_jobs.json /tmp/seen_jobs.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin data:data || true

          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf .
          fi

          cp /tmp/seen_jobs.json seen_jobs.json
          git add seen_jobs.json

          if ! git diff --cached --quiet; then
            git commit -m "seen_jobs update [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"

            # 🔥 مهم: يمنع مشاكل الـ race condition
            git pull --rebase origin data || true

            git push origin data
            echo "✅ saved"
          else
            echo "ℹ️ no changes"
          fi

      # 📦 Upload logs (debug lifesaver)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: bot.log
