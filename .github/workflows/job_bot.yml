name: Cybersecurity Jobs Bot 

on:
  schedule:
   - cron: "0 */2 * * *" # Every 2 hours   
  workflow_dispatch:

# V17: prevent simultaneous runs (manual + cron) to avoid DB race conditions
concurrency:
  group: cybersec-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # PRIMARY STORAGE = CACHE
      - name: Restore jobs database from cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: jobs_bot.db
          key: jobs-db-${{ github.repository }}
          restore-keys: |
            jobs-db-

      # FALLBACK = DATA BRANCH
      - name: Restore jobs database from git branch fallback
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          git fetch origin data:data || echo "⚠️ data branch not found yet"
          git checkout data -- jobs_bot.db 2>/dev/null || echo "ℹ️ No existing DB found in data branch"

      - name: Validate restored database
        run: |
          if [ -f jobs_bot.db ]; then
            ROWS=$(python3 -c "import sqlite3; c=sqlite3.connect('jobs_bot.db'); print(c.execute('SELECT COUNT(*) FROM seen_jobs').fetchone()[0])" 2>/dev/null || echo "?")
            echo "✅ jobs_bot.db ready: $(wc -c < jobs_bot.db) bytes | seen_jobs rows: $ROWS"
          else
            echo "ℹ️ Fresh DB will be created by the bot"
          fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID:   ${{ secrets.TELEGRAM_GROUP_ID }}

          # Topics
          TOPIC_EGYPT:         ${{ secrets.TOPIC_EGYPT }}
          TOPIC_REMOTE:        ${{ secrets.TOPIC_REMOTE }}
          TOPIC_PENTEST:       ${{ secrets.TOPIC_PENTEST }}
          TOPIC_SOC:           ${{ secrets.TOPIC_SOC }}
          TOPIC_APPSEC:        ${{ secrets.TOPIC_APPSEC }}
          TOPIC_CLOUDSEC:      ${{ secrets.TOPIC_CLOUDSEC }}
          TOPIC_GRC:           ${{ secrets.TOPIC_GRC }}
          TOPIC_SECENG:        ${{ secrets.TOPIC_SECENG }}
          TOPIC_GULF:          ${{ secrets.TOPIC_GULF }}
          TOPIC_INTERNSHIPS:   ${{ secrets.TOPIC_INTERNSHIPS }}
          TOPIC_NETWORKSEC:    ${{ secrets.TOPIC_NETWORKSEC }}

          # API Keys
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          RAPIDAPI_KEY:        ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          FINDWORK_API_KEY:    ${{ secrets.FINDWORK_API_KEY }}
          JOOBLE_API_KEY:      ${{ secrets.JOOBLE_API_KEY }}
          REED_API_KEY:        ${{ secrets.REED_API_KEY }}

          # Proxy rotation
          PROXIES:             ${{ secrets.PROXIES }}

        run: python main.py

      # FALLBACK PERSISTENCE = DATA BRANCH
      - name: Save jobs database to data branch
        if: always()
        run: |
          if [ ! -f jobs_bot.db ]; then
            echo "ℹ️ No jobs_bot.db to save — skipping"
            exit 0
          fi

          cp jobs_bot.db /tmp/jobs_bot.db

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash --include-untracked || true
          git fetch origin data:data || true

          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          cp /tmp/jobs_bot.db jobs_bot.db
          git add jobs_bot.db

          if ! git diff --cached --quiet; then
            git commit -m "jobs_bot.db update [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push origin data
            echo "✅ jobs_bot.db saved to data branch"
          else
            echo "ℹ️ No changes in DB"
          fi
