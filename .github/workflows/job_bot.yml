name: Cybersecurity Jobs Bot V5

on:
  schedule:
    - cron: "0 */3 * * *"       # Every 3 hour
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen_jobs.json
        run: |
          git fetch origin data:data || true
          git checkout data -- seen_jobs.json 2>/dev/null || echo '[]' > seen_jobs.json
          if ! python3 -c "import json; json.load(open('seen_jobs.json'))" 2>/dev/null; then
            echo "⚠️ Corrupt seen_jobs.json — resetting"
            echo '[]' > seen_jobs.json
          fi
          echo "✅ seen_jobs.json: $(wc -c < seen_jobs.json) bytes"

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID:   ${{ secrets.TELEGRAM_GROUP_ID }}

          # Topics
          TOPIC_EGYPT:         ${{ secrets.TOPIC_EGYPT }}
          TOPIC_REMOTE:        ${{ secrets.TOPIC_REMOTE }}
          TOPIC_PENTEST:       ${{ secrets.TOPIC_PENTEST }}
          TOPIC_SOC:           ${{ secrets.TOPIC_SOC }}
          TOPIC_APPSEC:        ${{ secrets.TOPIC_APPSEC }}
          TOPIC_CLOUDSEC:      ${{ secrets.TOPIC_CLOUDSEC }}
          TOPIC_GRC:           ${{ secrets.TOPIC_GRC }}
          TOPIC_SECENG:        ${{ secrets.TOPIC_SECENG }}
          TOPIC_GULF:          ${{ secrets.TOPIC_GULF }}
          TOPIC_INTERNSHIPS:   ${{ secrets.TOPIC_INTERNSHIPS }}

          # API Keys
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
          RAPIDAPI_KEY:        ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          FINDWORK_API_KEY:    ${{ secrets.FINDWORK_API_KEY }}
          JOOBLE_API_KEY:      ${{ secrets.JOOBLE_API_KEY }}
          REED_API_KEY:        ${{ secrets.REED_API_KEY }}

        run: python main.py

      - name: Save seen_jobs.json
        if: always()
        run: |
          # Save BEFORE any git operations to avoid checkout conflicts
          cp seen_jobs.json /tmp/seen_jobs.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash any local changes so checkout doesn't fail
          git stash --include-untracked || true

          git fetch origin data:data || true

          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . || true
          fi

          cp /tmp/seen_jobs.json seen_jobs.json
          git add seen_jobs.json
          if ! git diff --cached --quiet; then
            git commit -m "seen_jobs update [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push origin data
            echo "✅ Saved"
          else
            echo "ℹ️ No changes"
          fi
